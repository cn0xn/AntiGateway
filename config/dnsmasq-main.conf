# AUTO-GENERATED by AntiGateway installer
# Слушаем на LAN-интерфейсе и loopback
interface=__IFACE__
interface=lo
bind-interfaces

# Не читаем /etc/resolv.conf
no-resolv

# Upstream DNS через AWG туннель (привязка к интерфейсу через SO_BINDTODEVICE)
# Провайдер не видит DNS-запросы
server=1.1.1.1@awg0
server=1.0.0.1@awg0

# Кэш
cache-size=10000

# Не форвардить short hostnames
domain-needed
bogus-priv

# Логирование
log-queries=no

user=root
